<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetSail LL-DASH Player</title>
  <script src="/dash.all.min.js"></script>
  <style>
    :root {
      --bg: #0a1118;
      --panel: #12202d;
      --accent: #2dd4bf;
      --muted: #94a3b8;
      --text: #e2e8f0;
      --ok: #22c55e;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      background: radial-gradient(circle at 20% 20%, #153047, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .wrap { max-width: 980px; margin: 0 auto; }
    h1 { font-size: 1.5rem; letter-spacing: 0.08em; margin: 0 0 6px; color: var(--accent); }
    p { margin: 0 0 16px; color: var(--muted); }
    .panel {
      border: 1px solid #234;
      background: linear-gradient(160deg, rgba(16, 38, 54, 0.8), rgba(11, 24, 34, 0.85));
      border-radius: 12px;
      overflow: hidden;
    }
    video { width: 100%; display: block; background: #000; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      padding: 12px;
    }
    .m {
      padding: 10px;
      border-radius: 8px;
      background: rgba(11, 24, 34, 0.9);
      border: 1px solid #203446;
    }
    .k { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .v { font-size: 1.2rem; color: var(--accent); margin-top: 4px; }
    .status {
      display: flex;
      justify-content: space-between;
      padding: 10px 12px;
      border-top: 1px solid #203446;
      color: var(--muted);
      font-size: 0.82rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: var(--ok);
      display: inline-block;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>NetSail LL-DASH</h1>
    <p>Low-latency DASH · dash.js · lowLatencyEnabled</p>

    <div class="panel">
      <video id="video" controls autoplay muted playsinline></video>
      <div class="metrics">
        <div class="m"><div class="k">Buffer</div><div class="v" id="buffer">0.00 s</div></div>
        <div class="m"><div class="k">Latency</div><div class="v" id="latency">-- s</div></div>
        <div class="m"><div class="k">Bitrate</div><div class="v" id="bitrate">-- kbps</div></div>
        <div class="m"><div class="k">Stalls</div><div class="v" id="stalls">0</div></div>
      </div>
      <div class="status">
        <div><span class="dot"></span><span id="status-text">Initializing...</span></div>
        <div id="manifestLbl"></div>
      </div>
    </div>
  </div>

  <script>
    const qs  = new URLSearchParams(window.location.search);
    const mpd = qs.get('mpd') || '/manifest.mpd';
    document.getElementById('manifestLbl').textContent = mpd;

    const video  = document.getElementById('video');
    const player = dashjs.MediaPlayer().create();

    // Expose for Playwright polling
    window.dashPlayer = player;
    window.__playbackEnded     = false;
    window.__rebufferCount     = 0;
    window.__rebufferDurations = [];
    window.__rebufferStart     = null;

    // Benchmark state variables
    let bitrateHistory     = [];
    let bitrateSwitchCount = 0;
    let lastBitrate        = null;
    let totalStallingTime  = 0;
    let stallingStartTime  = null;
    let isStalling         = false;

    // Trace-driven bandwidth cap (injected by benchmark.py)
    window.__traceBandwidthKbps = null;
    window.__setTraceBandwidth  = function(bwKbps) {
      window.__traceBandwidthKbps = bwKbps;
      if (!window.dashPlayer) return;
      try {
        window.dashPlayer.updateSettings({
          streaming: { abr: {
            maxBitrate: { video: Math.round(bwKbps) },
            throughput: { bandwidthSafetyFactor: 1.0 },
          }}
        });
      } catch(e) {}
    };

    player.updateSettings({
      streaming: {
        lowLatencyEnabled: true,
        delay: {
          liveDelayFragmentCount: 4,
          useSuggestedPresentationDelay: false,
        },
        buffer: {
          fastSwitchEnabled: true,
          bufferTimeAtTopQuality: 6,
          bufferTimeDefault: 5,
        },
        abr: {
          initialBitrate: { video: 400 },
          autoSwitchBitrate: { video: true },
        },
        timeouts: { load: 120000 },
      }
    });

    player.initialize(video, mpd, true);

    function updateStatus(text) {
      document.getElementById('status-text').textContent = text;
    }

    player.on(dashjs.MediaPlayer.events.CAN_PLAY, () => updateStatus('Playing'));
    player.on(dashjs.MediaPlayer.events.PLAYBACK_PLAYING, () => {
      updateStatus('Playing');
      if (isStalling && stallingStartTime) {
        totalStallingTime += Date.now() - stallingStartTime;
        isStalling = false;
        stallingStartTime = null;
      }
      if (window.__rebufferStart) {
        window.__rebufferDurations.push(Date.now() - window.__rebufferStart);
        window.__rebufferStart = null;
      }
    });
    player.on(dashjs.MediaPlayer.events.PLAYBACK_WAITING, () => {
      updateStatus('Buffering...');
      if (!isStalling) {
        isStalling = true;
        stallingStartTime = Date.now();
        window.__rebufferCount++;
        window.__rebufferStart = Date.now();
      }
    });
    player.on(dashjs.MediaPlayer.events.PLAYBACK_ENDED, () => {
      updateStatus('Playback ended');
      window.__playbackEnded = true;
    });
    player.on(dashjs.MediaPlayer.events.ERROR, e => {
      updateStatus('Error: ' + (e.error?.message || 'Unknown'));
    });

    // Throughput tracking via stable public event
    window.__throughputSamples = [];
    player.on(dashjs.MediaPlayer.events.FRAGMENT_LOADING_COMPLETED, e => {
      const req = e.request;
      if (req && req.mediaType === 'video' && req.type === 'MediaSegment') {
        const bytes = req.bytesLoaded || 0;
        const ms = req.requestEndDate - req.requestStartDate;
        if (ms > 0 && bytes > 0) {
          window.__throughputSamples.push((bytes * 8) / ms);
        }
      }
    });

    setInterval(() => {
      // Buffer
      const b = player.getBufferLength('video') || 0;
      document.getElementById('buffer').textContent = `${b.toFixed(2)} s`;

      // Live latency
      let latency = null;
      if (typeof player.getCurrentLiveLatency === 'function') {
        latency = player.getCurrentLiveLatency();
      }
      document.getElementById('latency').textContent =
        latency && isFinite(latency) ? `${latency.toFixed(2)} s` : '-- s';

      // Bitrate + switch tracking
      const rep = player.getCurrentRepresentationForType('video');
      if (rep && rep.bandwidth) {
        const bps = rep.bandwidth;
        document.getElementById('bitrate').textContent =
          `${Math.round(bps / 1000)} kbps`;
        bitrateHistory.push({ bitrate: bps, timestamp: Date.now() });
        if (lastBitrate !== null && lastBitrate !== bps) {
          bitrateSwitchCount++;
          document.getElementById('stalls').textContent = bitrateSwitchCount;
        }
        lastBitrate = bps;
      }

      // Recover from stall if playing
      if (isStalling && stallingStartTime && !video.paused && video.readyState >= 3) {
        totalStallingTime += Date.now() - stallingStartTime;
        isStalling = false;
        stallingStartTime = null;
        if (window.__rebufferStart) {
          window.__rebufferDurations.push(Date.now() - window.__rebufferStart);
          window.__rebufferStart = null;
        }
        updateStatus('Playing');
      }
    }, 500);
  </script>
</body>
</html>
