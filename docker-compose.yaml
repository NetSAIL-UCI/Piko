# ============================================================================
# NetSail - Streaming Testbed with Network Emulation (HLS/DASH + WebRTC)
# ============================================================================
#
# Services:
#   - hls-dash-server: HLS/DASH video streaming server (Python)
#   - lldash-server:   LL-DASH video streaming server (Python)
#   - webrtc-server:   WebRTC streaming server using mediasoup (Node.js)
#   - shaper:          Network emulator with tc/netem (applies to traffic)
#
# Quick Start:
#   docker-compose up -d
#
# Access:
#   DASH:
#     - Direct server (no shaping):  http://localhost:8080
#     - Via shaper (shaped traffic): http://localhost:9080
#   LL-DASH:
#     - Direct server (no shaping):  http://localhost:8081
#     - Via shaper (shaped traffic): http://localhost:9081
#   WebRTC:
#     - Direct server (no shaping):  http://localhost:3000
#     - Via shaper (shaped traffic): http://localhost:9030
#
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # HLS/DASH Streaming Server
  # --------------------------------------------------------------------------
  # Serves HLS and DASH video content (MPD/m3u8 manifest + video segments)
  # 
  hls-dash-server:
    build:
      context: ./hls-dash-server
      dockerfile: Dockerfile
    image: netsail/hls-dash-server:latest
    container_name: netsail-hls-dash-server
    volumes:
      # Mount your DASH content here (manifest.mpd + segments)
      # Generate content with: cd Benchmarking/scripts && ./generate-dash.sh
      - ./content:/app/content:ro
      # Network trace file (same trace used by WebRTC shaper)
      - ./shaper/trace:/trace:ro
      # tc-trace.py script for direct tc/netem shaping (no nginx proxy)
      - ./shaper/tc-trace.py:/app/tc-trace.py:ro
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
      CONTENT_DIR: "/app/content"
    ports:
      # Direct access — tc/netem shaping applied inside this container
      - "8080:8080"
    cap_add:
      - NET_ADMIN
    # Auto-start tc-trace.py alongside the Python server so HTTP traffic is
    # shaped by tc/netem directly (no nginx proxy hop).
    # benchmark.py can also POST /startShaping to restart it mid-run.
    command: >
      sh -c "python3 /app/tc-trace.py &
             python3 server.py"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      netsail:
        ipv4_address: 192.168.100.20

  # --------------------------------------------------------------------------
  # LL-DASH Streaming Server
  # --------------------------------------------------------------------------
  # Serves LL-DASH player and DASH/CMAF artifacts for low-latency experiments
  #
  lldash-server:
    build:
      context: ./lldash-server
      dockerfile: Dockerfile
    image: netsail/lldash-server:latest
    container_name: netsail-lldash-server
    volumes:
      - ./content:/app/content:ro
      - ./shaper/trace:/trace:ro
      - ./shaper/tc-trace.py:/app/tc-trace.py:ro
    environment:
      PORT: "8081"
      HOST: "0.0.0.0"
      CONTENT_DIR: "/app/content"
    ports:
      - "8081:8081"
    cap_add:
      - NET_ADMIN
    command: >
      sh -c "python3 /app/tc-trace.py &
             python3 server.py"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      netsail:
        ipv4_address: 192.168.100.21

  # --------------------------------------------------------------------------
  # WebRTC Streaming Server (mediasoup)
  # --------------------------------------------------------------------------
  # Serves WebRTC video streams for comparison with DASH
  # Uses mediasoup SFU to stream video content over WebRTC
  #
  webrtc-server:
    build:
      context: ./webrtc-server
      dockerfile: Dockerfile
    image: netsail/webrtc-server:latest
    container_name: netsail-webrtc
    volumes:
      - ./content:/app/content:ro
      - ./shaper/trace:/trace:ro
      - ./shaper/tc-trace.py:/app/tc-trace.py:ro
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      CONTENT_DIR: "/app/content"
      ANNOUNCED_IP: "127.0.0.1"
    ports:
      - "3000:3000"
      - "10000-10100:10000-10100/udp"
      - "10000-10100:10000-10100/tcp"
    cap_add:
      - NET_ADMIN
    # Auto-start tc-trace.py alongside the node server so RTP/UDP traffic is
    # shaped by the same trace as the nginx shaper, without needing 'sudo docker exec'.
    # benchmark.py can also call POST /startShaping to restart it mid-run.
    command: >
      sh -c "python3 /app/tc-trace.py &
             node server.js"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      netsail:
        ipv4_address: 192.168.100.30

  # --------------------------------------------------------------------------
  # Network Shaper (tc/netem)
  # --------------------------------------------------------------------------
  # Applies network conditions from trace files using Linux tc/netem
  # Acts as a reverse proxy in front of the DASH server
  #
  # NOTE: Requires Linux host. Won't work on Docker Desktop for macOS/Windows.
  #
  shaper:
    build:
      context: ./shaper
      dockerfile: Dockerfile
    image: netsail/shaper:latest
    container_name: netsail-shaper
    volumes:
      # Network trace file (copy traces here with --trace option in benchmark.py)
      - ./shaper/trace:/trace:ro
      
      # Custom nginx config to proxy to server
      - ./shaper/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      ETHERNET: eth0
      INTERVAL: "0.01"
      DEFAULT_RATE: "100mbit"
      DEFAULT_CEIL: "50mbit"
      DEFAULT_DELAY: "40ms"
      DEFAULT_LOSS: "0.1%"
    ports:
      # Access DASH server through shaper (traffic shaped)
      - "9080:80"
      # Access LL-DASH server through shaper (traffic shaped)
      - "9081:8081"
      - "9443:443"
      # Access WebRTC server through shaper (traffic shaped)
      - "9030:8030"
    cap_add:
      - NET_ADMIN
    depends_on:
      - hls-dash-server
      - lldash-server
      - webrtc-server
    restart: unless-stopped
    networks:
      netsail:
        ipv4_address: 192.168.100.10

# ============================================================================
# Network Configuration
# ============================================================================
networks:
  netsail:
    name: netsail
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: "192.168.100.0/24"
          gateway: "192.168.100.1"
