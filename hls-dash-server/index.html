<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetSail DASH Player</title>
  <script src="/dash.all.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      color: #e4e4e7;
      padding: 2rem;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: #22d3ee;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    
    .subtitle {
      color: #71717a;
      font-size: 0.875rem;
    }
    
    .player-container {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid #27272a;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    
    video {
      width: 100%;
      display: block;
      background: #000;
    }
    
    .metrics-panel {
      background: rgba(15, 15, 35, 0.8);
      padding: 1.5rem;
      border-top: 1px solid #27272a;
    }
    
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }
    
    .metric {
      background: rgba(39, 39, 42, 0.5);
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid #3f3f46;
    }
    
    .metric-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #71717a;
      margin-bottom: 0.5rem;
    }
    
    .metric-value {
      font-size: 1.5rem;
      font-weight: 600;
      color: #22d3ee;
    }
    
    .metric-value.warning {
      color: #fbbf24;
    }
    
    .metric-value.danger {
      color: #ef4444;
    }
    
    .metric-value.good {
      color: #22c55e;
    }
    
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid #27272a;
      font-size: 0.75rem;
    }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .config-panel {
      margin-top: 1.5rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 1rem;
    }
    
    .config-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #71717a;
      margin-bottom: 1rem;
    }
    
    .config-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid #27272a;
    }
    
    .config-item:last-child {
      border-bottom: none;
    }
    
    .config-key {
      color: #a1a1aa;
    }
    
    .config-value {
      color: #22d3ee;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>NetSail</h1>
      <p class="subtitle">DASH Streaming Testbed</p>
    </header>
    
    <div class="player-container">
      <video id="video" controls autoplay muted></video>
      
      <div class="metrics-panel">
        <div class="metrics-grid">
          <div class="metric">
            <div class="metric-label">Buffer Length</div>
            <div class="metric-value" id="buffer">0.00s</div>
          </div>
          <div class="metric">
            <div class="metric-label">Bitrate</div>
            <div class="metric-value" id="bitrate">-- kbps</div>
          </div>
          <div class="metric">
            <div class="metric-label">Avg Bitrate</div>
            <div class="metric-value" id="avg-bitrate">-- kbps</div>
          </div>
          <div class="metric">
            <div class="metric-label">Bitrate Switches</div>
            <div class="metric-value" id="bitrate-switches">0</div>
          </div>
          <div class="metric">
            <div class="metric-label">Stalling Time</div>
            <div class="metric-value" id="stalling-time">0.00s</div>
          </div>
          <div class="metric">
            <div class="metric-label">Latency</div>
            <div class="metric-value" id="latency">-- ms</div>
          </div>
          <div class="metric">
            <div class="metric-label">Dropped Frames</div>
            <div class="metric-value" id="dropped">0</div>
          </div>
        </div>
      </div>
      
      <div class="status-bar">
        <div class="status-indicator">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">Initializing...</span>
        </div>
        <div>
          <span id="current-time">0:00</span> / <span id="duration">0:00</span>
        </div>
      </div>
    </div>
    
    <div class="config-panel">
      <div class="config-title">Stream Configuration</div>
      <div class="config-item">
        <span class="config-key">Manifest URL</span>
        <span class="config-value" id="manifest-url">--</span>
      </div>
      <div class="config-item">
        <span class="config-key">Server</span>
        <span class="config-value" id="server-url">--</span>
      </div>
      <div class="config-item">
        <span class="config-key">Protocol</span>
        <span class="config-value">DASH (MPEG-DASH)</span>
      </div>
    </div>
  </div>

  <script>
    // Determine manifest URL based on current location
    const baseUrl = window.location.origin;
    const manifestUrl = `${baseUrl}/manifest.mpd`;
    
    document.getElementById('manifest-url').textContent = '/manifest.mpd';
    document.getElementById('server-url').textContent = baseUrl;
    
    // Initialize dash.js player
    const player = dashjs.MediaPlayer().create();
    const video = document.getElementById('video');

    // Allow slow/shaped networks: long segment timeout, start at lowest quality
    player.updateSettings({
      streaming: {
        timeouts: { load: 120000 },
        abr: {
          initialBitrate: { video: 100 },       // Start at lowest rung to minimize startup stall
          autoSwitchBitrate: { video: true },    // Let BOLA switch freely
        },
      }
    });

    player.initialize(video, manifestUrl, true);

    // Expose player and benchmark state for headless benchmarking (Playwright)
    window.dashPlayer = player;
    window.__playbackEnded = false;
    window.__rebufferCount = 0;
    window.__rebufferDurations = [];
    window.__rebufferStart = null;

    // Trace-driven bandwidth: benchmark.py injects the current trace BW for reference.
    // We only record it — we do NOT cap maxBitrate dynamically because updating
    // maxBitrate every second with instantaneous trace BW causes wild oscillation
    // (BOLA oscillated 96 times in a 5-min trace when capped at instantaneous BW).
    // BOLA is already aware of real bandwidth through segment download timing.
    window.__traceBandwidthKbps = null;
    window.__setTraceBandwidth = function(bwKbps) {
      window.__traceBandwidthKbps = bwKbps;
    };

    // Metrics tracking variables
    let bitrateHistory = [];          // Array of {bitrate, timestamp} for average calculation
    let bitrateSwitchCount = 0;       // Number of bitrate switches
    let lastBitrate = null;           // Last recorded bitrate for switch detection
    let totalStallingTime = 0;        // Total stalling time in milliseconds
    let stallingStartTime = null;     // When current stall started
    let isStalling = false;           // Currently stalling flag
    
    // Update status
    function updateStatus(text, isError = false) {
      document.getElementById('status-text').textContent = text;
      document.getElementById('status-dot').style.background = isError ? '#ef4444' : '#22c55e';
    }
    
    // Format time
    function formatTime(seconds) {
      if (!seconds || isNaN(seconds)) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
    
    // Update metrics
    function updateMetrics() {
      // Buffer length
      const bufferLength = player.getBufferLength('video');
      const bufferEl = document.getElementById('buffer');
      bufferEl.textContent = `${(bufferLength || 0).toFixed(2)}s`;
      bufferEl.className = 'metric-value ' + (
        bufferLength < 2 ? 'danger' : 
        bufferLength < 5 ? 'warning' : 'good'
      );
      
      
      // Get current bitrate
      let currentBitrate = null;
      try {
        const currentRep = player.getCurrentRepresentationForType('video');
        if (currentRep && currentRep.bandwidth) {
          currentBitrate = currentRep.bandwidth;
          const kbps = Math.round(currentBitrate / 1000);
          document.getElementById('bitrate').textContent = `${kbps} kbps`;
        }
      } catch (e) {
        // Fallback method
        const bitrateInfo = player.getQualityFor('video');
        const bitrateList = player.getBitrateInfoListFor('video');
        if (bitrateList && bitrateList[bitrateInfo]) {
          currentBitrate = bitrateList[bitrateInfo].bitrate;
          const kbps = Math.round(currentBitrate / 1000);
          document.getElementById('bitrate').textContent = `${kbps} kbps`;
        }
      }
      
      // Track bitrate for average and switch detection
      if (currentBitrate !== null) {
        const now = Date.now();
        bitrateHistory.push({ bitrate: currentBitrate, timestamp: now });
        
        // Detect bitrate switch
        if (lastBitrate !== null && lastBitrate !== currentBitrate) {
          bitrateSwitchCount++;
          document.getElementById('bitrate-switches').textContent = bitrateSwitchCount;
        }
        lastBitrate = currentBitrate;
        
        // Calculate average bitrate
        if (bitrateHistory.length > 0) {
          const avgBitrate = bitrateHistory.reduce((sum, b) => sum + b.bitrate, 0) / bitrateHistory.length;
          const avgKbps = Math.round(avgBitrate / 1000);
          document.getElementById('avg-bitrate').textContent = `${avgKbps} kbps`;
        }
      }
      
      // Update stalling time display
      let displayStallingTime = totalStallingTime;
      if (isStalling && stallingStartTime) {
        displayStallingTime += Date.now() - stallingStartTime;
      }
      document.getElementById('stalling-time').textContent = `${(displayStallingTime / 1000).toFixed(2)}s`;
      const stallingEl = document.getElementById('stalling-time');
      stallingEl.className = 'metric-value ' + (
        displayStallingTime > 5000 ? 'danger' :
        displayStallingTime > 1000 ? 'warning' : 'good'
      );
      
      // Dropped frames
      if (video.getVideoPlaybackQuality) {
        const quality = video.getVideoPlaybackQuality();
        const droppedEl = document.getElementById('dropped');
        droppedEl.textContent = quality.droppedVideoFrames;
        droppedEl.className = 'metric-value ' + (
          quality.droppedVideoFrames > 10 ? 'danger' :
          quality.droppedVideoFrames > 0 ? 'warning' : 'good'
        );
      }
      
      // Latency (download time of last segment)
      try {
        const dashMetrics = player.getDashMetrics();
        if (dashMetrics) {
          const httpRequests = dashMetrics.getHttpRequests('video');
          if (httpRequests && httpRequests.length > 0) {
            // Find the last completed request
            for (let i = httpRequests.length - 1; i >= 0; i--) {
              const req = httpRequests[i];
              if (req._tfinish && req.tresponse) {
                const latency = req.tresponse.getTime() - req.trequest.getTime();
                document.getElementById('latency').textContent = `${latency} ms`;
                break;
              } else if (req.tresponse && req.trequest) {
                const latency = req.tresponse.getTime() - req.trequest.getTime();
                document.getElementById('latency').textContent = `${latency} ms`;
                break;
              }
            }
          }
        }
      } catch (e) {
        console.log('Latency metric error:', e);
      }
      
      // Time
      document.getElementById('current-time').textContent = formatTime(video.currentTime);
      document.getElementById('duration').textContent = formatTime(video.duration);
    }
    
    // Event listeners
    player.on(dashjs.MediaPlayer.events.CAN_PLAY, () => {
      updateStatus('Playing');
      setInterval(updateMetrics, 500);
    });
    
    player.on(dashjs.MediaPlayer.events.PLAYBACK_WAITING, () => {
      updateStatus('Buffering...', false);
      // Start tracking stalling time
      if (!isStalling) {
        isStalling = true;
        stallingStartTime = Date.now();
        window.__rebufferCount++;
        window.__rebufferStart = Date.now();
      }
    });
    
    player.on(dashjs.MediaPlayer.events.PLAYBACK_PLAYING, () => {
      updateStatus('Playing');
      // Stop tracking stalling time
      if (isStalling && stallingStartTime) {
        totalStallingTime += Date.now() - stallingStartTime;
        isStalling = false;
        stallingStartTime = null;
      }
      if (window.__rebufferStart) {
        window.__rebufferDurations.push(Date.now() - window.__rebufferStart);
        window.__rebufferStart = null;
      }
    });
    
    player.on(dashjs.MediaPlayer.events.ERROR, (e) => {
      console.error('Player error:', e);
      updateStatus('Error: ' + (e.error?.message || 'Unknown'), true);
    });
    
    player.on(dashjs.MediaPlayer.events.PLAYBACK_ENDED, () => {
      updateStatus('Playback ended');
      window.__playbackEnded = true;
    });

    // Throughput tracking via stable public event.
    // bytesLoaded may be missing in some dash.js builds; fall back to bytesTotal/bytes.
    // requestEndDate and requestFirstByteDate are Date objects so subtraction gives ms.
    window.__throughputSamples = [];
    player.on(dashjs.MediaPlayer.events.FRAGMENT_LOADING_COMPLETED, e => {
      const req = e.request;
      if (!req) return;
      if (req.mediaType !== 'video') return;
      // Accept MediaSegment and regular index requests (type can vary by build)
      const bytes = req.bytesLoaded || req.bytesTotal || req.bytes || 0;
      const startDate = req.requestStartDate || req.trequest;
      const endDate   = req.requestEndDate   || req.tresponse;
      if (!startDate || !endDate) return;
      const ms = (endDate instanceof Date ? endDate.getTime() : endDate)
               - (startDate instanceof Date ? startDate.getTime() : startDate);
      if (ms > 0 && bytes > 0) {
        // (bytes × 8) / ms  =  kbps  (since 1 kbps = 1 bit/ms)
        window.__throughputSamples.push((bytes * 8) / ms);
      }
    });
  </script>
</body>
</html>
