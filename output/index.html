<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
</head>
<body>
  <video id="video" controls autoplay width="720"></video>
  <div id="metrics" style="font-family: monospace; margin-top: 20px;"></div>
  
  <script>
    const player = dashjs.MediaPlayer().create();
    player.initialize(document.getElementById('video'), 
      'http://localhost:8080/manifest.mpd', true);
    
    player.on(dashjs.MediaPlayer.events.CAN_PLAY, function() {
      setInterval(() => {
        const video = document.getElementById('video');
        const bufferLength = player.getBufferLength();
        
        document.getElementById('metrics').innerHTML = `
          Buffer Length: ${bufferLength?.toFixed(2) || 0}s<br>
          Current Time: ${video.currentTime.toFixed(2)}s<br>
          Duration: ${video.duration.toFixed(2)}s
        `;
      }, 500);
    });
  </script>
</body>
</html>
