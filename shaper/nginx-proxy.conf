# Nginx reverse proxy configuration
# Proxies requests to the DASH server through the traffic shaper

upstream dash_server {
    server 192.168.100.20:8080;
    keepalive 32;
}

server {
    listen 80;
    listen 443 ssl;

    ssl_certificate     server-cert.pem;
    ssl_certificate_key server-key.pem;

    # Health check for the shaper itself
    location /shaper/health {
        access_log off;
        return 200 '{"status":"healthy","service":"shaper"}\n';
        add_header Content-Type application/json;
    }

    # Proxy all other requests to the DASH server
    location / {
        proxy_pass http://dash_server;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering settings for streaming
        proxy_buffering off;
        proxy_request_buffering off;
        
        # CORS headers (in case server doesn't add them)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;
        
        # Indicate traffic is shaped
        add_header 'X-Traffic-Shaped' 'true' always;
    }
}

