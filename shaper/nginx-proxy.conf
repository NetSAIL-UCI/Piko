# Nginx reverse proxy configuration
# Proxies requests to streaming servers through the traffic shaper

upstream dash_server {
    server 192.168.100.20:8080;
    keepalive 32;
}

upstream lldash_server {
    server 192.168.100.21:8081;
    keepalive 32;
}

upstream webrtc_server {
    server 192.168.100.30:3000;
    keepalive 32;
}

# DASH Server (port 80/443)
server {
    listen 80;
    listen 443 ssl;

    ssl_certificate     server-cert.pem;
    ssl_certificate_key server-key.pem;

    # Health check for the shaper itself
    location /shaper/health {
        access_log off;
        return 200 '{"status":"healthy","service":"shaper"}\n';
        add_header Content-Type application/json;
    }

    # Proxy all other requests to the DASH server
    location / {
        proxy_pass http://dash_server;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering settings for streaming
        proxy_buffering off;
        proxy_request_buffering off;
        
        # CORS headers (in case server doesn't add them)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;
        
        # Indicate traffic is shaped
        add_header 'X-Traffic-Shaped' 'true' always;
    }
}

# WebRTC Server (port 8030)
server {
    listen 8030;

    # Health check for the shaper itself
    location /shaper/health {
        access_log off;
        return 200 '{"status":"healthy","service":"shaper-webrtc"}\n';
        add_header Content-Type application/json;
    }

    # Proxy all requests to the WebRTC signaling server
    location / {
        proxy_pass http://webrtc_server;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering off for signaling
        proxy_buffering off;
        proxy_request_buffering off;
        
        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
        
        # Indicate traffic is shaped
        add_header 'X-Traffic-Shaped' 'true' always;
    }
}

# LL-DASH Server (port 8081)
server {
    listen 8081;

    # Health check for the shaper itself
    location /shaper/health {
        access_log off;
        return 200 '{"status":"healthy","service":"shaper-lldash"}\n';
        add_header Content-Type application/json;
    }

    # Proxy all requests to the LL-DASH server
    location / {
        proxy_pass http://lldash_server;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering disabled for low-latency delivery
        proxy_buffering off;
        proxy_request_buffering off;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        # Indicate traffic is shaped
        add_header 'X-Traffic-Shaped' 'true' always;
    }
}
