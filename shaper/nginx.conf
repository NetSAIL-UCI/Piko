# Default nginx configuration for the shaper container
# This acts as a reverse proxy with traffic shaping

server {
    listen 80;
    listen 443 ssl;

    ssl_certificate     server-cert.pem;
    ssl_certificate_key server-key.pem;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Proxy to upstream service (configure via environment or replace this)
    location / {
        # Default: return a simple response
        # Override this in your own nginx.conf when using the shaper
        return 200 "NetSail Shaper Ready\n";
        add_header Content-Type text/plain;
    }
}

